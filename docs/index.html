<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>股票分析</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#f0f2f5;--card:#fff;--blue:#2563eb;--blue-hover:#1d4ed8;--dark:#1a1a2e;--text:#1f2937;--sub:#6b7280;--green:#059669;--red:#dc2626;--border:#e5e7eb;--radius:14px;--shadow:0 1px 3px rgba(0,0,0,.08);--nav-h:54px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;padding-top:var(--nav-h);-webkit-font-smoothing:antialiased}
.top-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;height:var(--nav-h);background:var(--dark);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px)}
.nav-item{flex:1;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);text-decoration:none;font-size:.88rem;font-weight:500;border-bottom:2px solid transparent;transition:all .2s;gap:4px}
.nav-item.active{color:#fff;border-bottom-color:var(--blue);background:rgba(37,99,235,.12)}
.main-content{max-width:520px;margin:0 auto;padding:16px 12px 40px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:12px}
.card-title{font-size:1rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:6px}
.form-group{margin-bottom:10px}
.form-label{display:block;font-size:.8rem;font-weight:600;color:var(--sub);margin-bottom:5px}
.form-input{width:100%;height:44px;padding:0 14px;font-size:.93rem;font-family:inherit;border:1.5px solid var(--border);border-radius:10px;background:var(--card);color:var(--text);transition:border-color .2s;appearance:none}
.form-input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.form-row{display:flex;gap:10px}.form-row>*{flex:1}
.btn{display:inline-flex;align-items:center;justify-content:center;height:44px;min-width:64px;padding:0 18px;font-size:.9rem;font-weight:600;font-family:inherit;border:none;border-radius:10px;cursor:pointer;transition:all .15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff}.btn-primary:hover{background:var(--blue-hover)}
.btn-success{background:var(--green);color:#fff}
.btn-danger{background:var(--red);color:#fff}
.btn-ghost{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-sm{height:34px;padding:0 12px;font-size:.8rem;border-radius:8px}
.btn-block{width:100%}
.btn:disabled{opacity:.5;pointer-events:none}
.status{font-size:.82rem;min-height:22px;padding:4px 0}
.status-error{color:var(--red)}.status-success{color:var(--green)}.status-info{color:var(--blue)}
.data-table{width:100%;border-collapse:collapse;font-size:.8rem}
.data-table th{background:#f8fafc;padding:9px 6px;font-weight:700;font-size:.75rem;color:var(--sub);border-bottom:2px solid var(--border)}
.data-table td{padding:8px 6px;text-align:center;border-bottom:1px solid var(--border)}
.table-scroll{max-height:320px;overflow-y:auto;-webkit-overflow-scrolling:touch;border-radius:8px;border:1px solid var(--border)}
.chart-box{position:relative;width:100%;height:250px;margin:4px 0}
.result-item{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.result-item:last-child{border-bottom:none}
.result-label{font-size:.82rem;color:var(--sub)}
.result-value{font-size:.95rem;font-weight:700}
.record-group-title{font-size:.9rem;font-weight:700;padding:10px 4px 4px}
.record-month-title{font-size:.82rem;font-weight:600;color:var(--sub);padding:4px 4px 4px 14px}
.record-row{display:flex;align-items:center;background:var(--card);border-radius:8px;padding:10px 12px;margin:3px 0 3px 20px;gap:8px;box-shadow:0 1px 2px rgba(0,0,0,.04)}
.record-info{flex:1;min-width:0}.record-info .code{font-size:.85rem;font-weight:600}.record-info .date-range{font-size:.73rem;color:var(--sub)}
.record-return{font-size:.88rem;font-weight:700;min-width:58px;text-align:center}
.record-return.positive{color:var(--green)}.record-return.negative{color:var(--red)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--dark);color:#fff;padding:10px 22px;border-radius:20px;font-size:.82rem;font-weight:500;z-index:999;opacity:0;pointer-events:none;transition:opacity .25s}
.toast.show{opacity:1}
.loading{display:inline-block;width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<nav class="top-nav">
  <a class="nav-item active" data-tab="return" onclick="switchTab('return')">📊 收益率</a>
  <a class="nav-item" data-tab="recovery" onclick="switchTab('recovery')">💰 回本</a>
  <a class="nav-item" data-tab="records" onclick="switchTab('records')">📁 记录</a>
</nav>

<main class="main-content">

<!-- ====== 收益率 ====== -->
<div id="tab-return" class="tab-page">
<div class="card">
  <div class="card-title">📊 收益率查询</div>
  <div class="form-group"><label class="form-label">股票代码</label><input type="text" id="stockCode" class="form-input" placeholder="输入代码，如 600519"></div>
  <div class="form-row"><div class="form-group"><label class="form-label">起始</label><input type="date" id="startDate" class="form-input"></div><div class="form-group"><label class="form-label">结束</label><input type="date" id="endDate" class="form-input"></div></div>
  <button class="btn btn-primary btn-block" id="queryBtn" onclick="doQuery()">查询</button>
  <div class="status" id="queryStatus"></div>
</div>
<div class="card" id="chartCard" style="display:none">
  <div class="card-title">📈 收益率曲线</div>
  <div class="chart-box"><canvas id="returnChart"></canvas></div>
  <div id="totalReturn" style="text-align:center;font-weight:700;font-size:1rem;padding:6px"></div>
</div>
<div class="card" id="tableCard" style="display:none">
  <div class="card-title">📋 每日数据</div>
  <div class="table-scroll"><table class="data-table"><thead><tr><th>日期</th><th>开盘</th><th>收盘</th><th>涨跌%</th></tr></thead><tbody id="tableBody"></tbody></table></div>
</div>
<button class="btn btn-success btn-block" id="saveBtn" style="display:none" onclick="doSave()">💾 保存此次查询</button>
</div>

<!-- ====== 回本计算 ====== -->
<div id="tab-recovery" class="tab-page" style="display:none">
<div class="card">
  <div class="card-title">💰 回本计算器</div>
  <div class="form-group"><label class="form-label">股票代码</label><input type="text" id="rcStock" class="form-input" placeholder="输入代码，如 600519"></div>
  <div class="form-row"><div class="form-group"><label class="form-label">买入日期</label><input type="date" id="rcDate" class="form-input"></div><div class="form-group"><label class="form-label">买入价格</label><input type="number" id="rcPrice" class="form-input" placeholder="如 1400.00" step="0.01"></div></div>
  <button class="btn btn-primary btn-block" id="rcBtn" onclick="doRecovery()">计算</button>
  <div class="status" id="rcStatus"></div>
</div>
<div class="card" id="rcResultCard" style="display:none">
  <div class="card-title">📊 计算结果</div>
  <div class="result-item"><span class="result-label">买入成本</span><span class="result-value" id="rBuyCost">--</span></div>
  <div class="result-item"><span class="result-label">买入当日收盘</span><span class="result-value" id="rBuyClose">--</span></div>
  <div class="result-item"><span class="result-label">当日涨跌</span><span class="result-value" id="rBuyPct">--</span></div>
  <div class="result-item"><span class="result-label">回本日期</span><span class="result-value" id="rBeDate">--</span></div>
  <div class="result-item"><span class="result-label">等待天数</span><span class="result-value" id="rDays">--</span></div>
  <div class="result-item"><span class="result-label">回本收盘价</span><span class="result-value" id="rBeClose">--</span></div>
  <div class="status" id="rMsg" style="margin-top:6px"></div>
</div>
<div class="card" id="rcChartCard" style="display:none">
  <div class="card-title">📈 价格走势</div>
  <div class="chart-box"><canvas id="priceChart"></canvas></div>
</div>
</div>

<!-- ====== 我的记录 ====== -->
<div id="tab-records" class="tab-page" style="display:none">
<div class="card">
  <div style="display:flex;align-items:center;gap:6px"><div class="card-title" style="margin-bottom:0;flex:1">📁 我的记录</div><button class="btn btn-sm btn-primary" id="btnAll" onclick="switchRecView('all')">全部</button><button class="btn btn-sm btn-ghost" id="btnYear" onclick="switchRecView('year')">按年度</button></div>
</div>
<div id="recordsContainer"></div>
</div>

</main>
<div class="toast" id="toast"></div>

<script>
// ====== API ======
const WORKER = 'https://stock-api.2530391707.workers.dev';

async function callApi(action, params){
  const url = WORKER + '/query?action=' + action + '&' + new URLSearchParams(params).toString();
  try{
    const r = await fetch(url);
    return await r.json();
  }catch(e){
    return {success: false, message: '网络连接失败'};
  }
}

function showToast(msg,d=2000){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),d)}
function setStatus(id,msg,type){const e=document.getElementById(id);if(e){e.textContent=msg;e.className='status status-'+type}}
function fmtDate(d){const s=String(d).replace(/-/g,'');return s.length===8?s.slice(0,4)+'-'+s.slice(4,6)+'-'+s.slice(6,8):d}
function fmtDateDisp(d){return fmtDate(d).replace(/-/g,'.')}

// ====== 标签 ======
function switchTab(tab){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  document.querySelectorAll('.tab-page').forEach(p=>p.style.display='none');
  const page=document.getElementById('tab-'+tab);if(page)page.style.display='';
  if(tab==='records')loadRecords();
  if(tab==='return'){const p=new URLSearchParams(location.search);const c=p.get('code'),s=p.get('start'),e=p.get('end');if(c&&s&&e){document.getElementById('stockCode').value=c;document.getElementById('startDate').value=fmtDate(s);document.getElementById('endDate').value=fmtDate(e);doQuery()}}
}

// ====== 收益率查询 ======
let returnChart=null, currentQuery=null;

async function doQuery(){
  const code=document.getElementById('stockCode').value.trim();
  const start=document.getElementById('startDate').value;
  const end=document.getElementById('endDate').value;
  if(!code){showToast('请输入股票代码');return}
  if(!start||!end){showToast('请选择日期');return}
  const btn=document.getElementById('queryBtn');btn.disabled=true;btn.textContent='查询中...';setStatus('queryStatus','正在获取数据...','info');

  const resp=await callApi('query',{code,start,end});
  btn.disabled=false;btn.textContent='查询';
  if(!resp.success){setStatus('queryStatus',resp.message,'error');return}

  currentQuery={code,start,end,return_pct:resp.total_return};
  setStatus('queryStatus','完成 | 涨跌 '+(resp.total_return>=0?'+':'')+resp.total_return.toFixed(2)+'% | '+resp.daily_data.length+'天',resp.total_return>=0?'success':'error');

  if(returnChart)returnChart.destroy();
  const ctx=document.getElementById('returnChart').getContext('2d');
  returnChart=new Chart(ctx,{type:'line',data:{labels:resp.date_labels,datasets:[{label:'累计收益率(%)',data:resp.return_rates,borderColor:'#2563eb',borderWidth:2,pointRadius:0,fill:true,backgroundColor:'rgba(37,99,235,.08)',tension:.15}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11},boxWidth:14},display:false}},scales:{x:{ticks:{maxTicksLimit:8,font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:10},callback:v=>v.toFixed(1)+'%'},grid:{color:'rgba(0,0,0,.05)'}}}}});
  document.getElementById('tableBody').innerHTML=resp.daily_data.map(r=>'<tr><td>'+r.date+'</td><td>'+r.open.toFixed(2)+'</td><td>'+r.close.toFixed(2)+'</td><td style="color:'+(r.change>=0?'var(--green)':'var(--red)')+';font-weight:600">'+(r.change>=0?'+':'')+r.change.toFixed(2)+'</td></tr>').join('');
  document.getElementById('totalReturn').innerHTML='<span style="color:'+(resp.total_return>=0?'var(--green)':'var(--red)')+'">区间涨跌幅: '+(resp.total_return>=0?'+':'')+resp.total_return.toFixed(2)+'%</span>';
  document.getElementById('chartCard').style.display='';document.getElementById('tableCard').style.display='';document.getElementById('saveBtn').style.display='';
}
function doSave(){if(!currentQuery)return;const records=JSON.parse(localStorage.getItem('stock_records')||'[]');records.unshift({...currentQuery,id:Date.now(),created_at:new Date().toISOString()});localStorage.setItem('stock_records',JSON.stringify(records));showToast('已保存')}

// ====== 回本计算 ======
let priceChart=null;
async function doRecovery(){
  const code=document.getElementById('rcStock').value.trim();
  const buyDate=document.getElementById('rcDate').value;
  const buyPrice=document.getElementById('rcPrice').value.trim();
  if(!code){showToast('请输入股票代码');return}
  if(!buyDate){showToast('请选择买入日期');return}
  if(!buyPrice||isNaN(+buyPrice)){showToast('请输入有效价格');return}
  const btn=document.getElementById('rcBtn');btn.disabled=true;btn.textContent='计算中...';setStatus('rcStatus','正在计算...','info');

  const resp=await callApi('recovery',{code,buy_date:buyDate,buy_price:buyPrice});
  btn.disabled=false;btn.textContent='计算';
  if(!resp.success){setStatus('rcStatus',resp.message,'error');return}
  setStatus('rcStatus','','info');

  const r=resp.result;
  document.getElementById('rcResultCard').style.display='';
  document.getElementById('rBuyCost').textContent='¥ '+r.buy_price.toFixed(2);
  document.getElementById('rBuyClose').textContent='¥ '+r.buy_close.toFixed(2);
  const pct=document.getElementById('rBuyPct');pct.textContent=(r.buy_pct>=0?'+':'')+r.buy_pct.toFixed(2)+'%';pct.style.color=r.buy_pct>=0?'var(--green)':'var(--red)';
  if(r.found){
    document.getElementById('rBeDate').textContent=r.breakeven_date;document.getElementById('rBeDate').style.color='var(--green)';
    document.getElementById('rDays').textContent=r.days_waited+' 天';document.getElementById('rBeClose').textContent='¥ '+r.breakeven_close.toFixed(2);
    setStatus('rMsg',r.message,'success');
  }else{
    document.getElementById('rBeDate').textContent='尚未回本';document.getElementById('rBeDate').style.color='var(--red)';
    document.getElementById('rDays').textContent='--';document.getElementById('rBeClose').textContent='--';
    setStatus('rMsg',r.message,'error');
  }
  document.getElementById('rcChartCard').style.display='';
  if(priceChart)priceChart.destroy();
  const ctx=document.getElementById('priceChart').getContext('2d');
  const bp=parseFloat(buyPrice);
  priceChart=new Chart(ctx,{type:'line',data:{labels:resp.chart_dates,datasets:[{label:'收盘价',data:resp.chart_closes,borderColor:'#2563eb',borderWidth:1.6,pointRadius:0,tension:.1},{label:'买入价',data:resp.chart_dates.map(()=>bp),borderColor:'#dc2626',borderWidth:1.2,borderDash:[6,4],pointRadius:0,fill:false},{label:'买入日',data:resp.chart_dates.map((l,i)=>(l===r.buy_date)?resp.chart_closes[i]:null),backgroundColor:'#dc2626',pointRadius:6,pointStyle:'triangle',showLine:false,rotation:180},{label:'回本日',data:resp.chart_dates.map((l,i)=>r.found&&l===r.breakeven_date?resp.chart_closes[i]:null),backgroundColor:'#059669',pointRadius:7,pointStyle:'circle',showLine:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:12}}},scales:{x:{ticks:{maxTicksLimit:8,font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:10}},grid:{color:'rgba(0,0,0,.05)'}}}}});
}

// ====== 我的记录 ======
let recView='all';
function switchRecView(m){recView=m;document.getElementById('btnAll').className='btn btn-sm '+(m==='all'?'btn-primary':'btn-ghost');document.getElementById('btnYear').className='btn btn-sm '+(m==='year'?'btn-primary':'btn-ghost');loadRecords()}
function loadRecords(){const records=JSON.parse(localStorage.getItem('stock_records')||'[]'),c=document.getElementById('recordsContainer');if(!records.length){c.innerHTML='<div style="text-align:center;padding:60px 0;color:var(--sub)">暂无保存的记录</div>';return}if(recView==='all'){c.innerHTML=records.map(r=>recRow(r)).join('')}else{const years={};records.forEach(r=>{const y=r.start.slice(0,4),m=r.start.slice(5,7);if(!years[y])years[y]={};if(!years[y][m])years[y][m]=[];years[y][m].push(r)});let h='';Object.keys(years).sort((a,b)=>b-a).forEach(y=>{h+='<div class="record-group-title">📁 '+y+'年</div>';Object.keys(years[y]).sort((a,b)=>b-a).forEach(m=>{h+='<div class="record-month-title">📅 '+m+'月 ('+years[y][m].length+'条)</div>';years[y][m].forEach(r=>{h+=recRow(r,true)})})});c.innerHTML=h||'<div style="text-align:center;padding:60px;color:var(--sub)">暂无记录</div>'}}
function recRow(r,indent){const cls=r.return_pct>=0?'positive':'negative';return '<div class="record-row" style="'+(indent?'margin-left:10px':'')+'"><div class="record-info"><div class="code">'+r.code+'</div><div class="date-range">'+fmtDateDisp(r.start)+' ~ '+fmtDateDisp(r.end)+'</div></div><span class="record-return '+cls+'">'+(r.return_pct>=0?'+':'')+r.return_pct.toFixed(2)+'%</span><button class="btn btn-sm btn-primary" onclick="viewRec(\''+r.code+'\',\''+r.start+'\',\''+r.end+'\')">查看</button><button class="btn btn-sm btn-danger" onclick="delRec('+r.id+')">🗑</button></div>'}
function viewRec(code,start,end){location.href='/?code='+code+'&start='+start+'&end='+end}
function delRec(id){if(!confirm('确定删除？'))return;const records=JSON.parse(localStorage.getItem('stock_records')||'[]');localStorage.setItem('stock_records',JSON.stringify(records.filter(r=>r.id!==id)));loadRecords();showToast('已删除')}

// ====== 启动 ======
document.addEventListener('DOMContentLoaded',()=>{const p=new URLSearchParams(location.search);if(p.get('code')){document.getElementById('stockCode').value=p.get('code');document.getElementById('startDate').value=fmtDate(p.get('start'));document.getElementById('endDate').value=fmtDate(p.get('end'));doQuery()}});
</script>
</body>
</html>
